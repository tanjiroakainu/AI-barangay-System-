<div class="p-6">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Process Documents</h1>
    <p class="text-gray-600 mt-2">Review and process document requests</p>
  </div>

  <div class="card">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-xl font-semibold text-gray-900">Document Requests</h2>
      <div class="flex space-x-2">
        <button class="btn-outline">Filter</button>
        <button class="btn-primary">Refresh</button>
      </div>
    </div>

    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Document Type</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Requester</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let doc of documents">
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ doc.type }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ doc.requester }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ doc.date }}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span [class]="{
                'bg-yellow-100 text-yellow-800': doc.status === 'Pending',
                'bg-blue-100 text-blue-800': doc.status === 'Processing'
              }" class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full">
                {{ doc.status }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
              <button (click)="approveDocument(doc)" class="text-green-600 hover:text-green-900 mr-3">Approve</button>
              <button (click)="rejectDocument(doc)" class="text-red-600 hover:text-red-900 mr-3">Reject</button>
              <button class="text-primary-600 hover:text-primary-900">View</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
