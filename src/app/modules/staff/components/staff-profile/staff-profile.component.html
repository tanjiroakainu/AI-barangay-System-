<div class="p-6">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Staff Profile</h1>
    <p class="text-gray-600 mt-2">Manage your staff information</p>
  </div>

  <div class="card">
    <h2 class="text-xl font-semibold text-gray-900 mb-6">Staff Information</h2>
    <form class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
          <input type="text" class="input-field" [(ngModel)]="staffProfile.firstName" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
          <input type="text" class="input-field" [(ngModel)]="staffProfile.lastName" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input type="email" class="input-field" [(ngModel)]="staffProfile.email" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Phone</label>
          <input type="tel" class="input-field" [(ngModel)]="staffProfile.phone" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Position</label>
          <input type="text" class="input-field" [(ngModel)]="staffProfile.position" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Department</label>
          <input type="text" class="input-field" [(ngModel)]="staffProfile.department" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Employee ID</label>
          <input type="text" class="input-field" [(ngModel)]="staffProfile.employeeId" readonly />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Hire Date</label>
          <input type="date" class="input-field" [(ngModel)]="staffProfile.hireDate" readonly />
        </div>
      </div>

      <div class="flex justify-end">
        <button (click)="updateProfile()" class="btn-primary">Update Profile</button>
      </div>
    </form>
  </div>
</div>
