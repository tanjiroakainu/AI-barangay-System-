<div class="p-6">
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Settings</h1>
    <p class="text-gray-600 mt-2">Configure system settings and preferences</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <div class="card">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">General Settings</h3>
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Barangay Name</label>
          <input type="text" class="input-field" value="Sample Barangay" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Barangay Captain</label>
          <input type="text" class="input-field" value="John Doe" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Contact Number</label>
          <input type="tel" class="input-field" value="(02) 123-4567" />
        </div>
        <button (click)="saveSettings()" class="btn-primary">Save Settings</button>
      </form>
    </div>

    <div class="card">
      <h3 class="text-lg font-semibold text-gray-900 mb-4">System Preferences</h3>
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-700">Email Notifications</span>
          <input type="checkbox" class="h-4 w-4 text-primary-600" checked />
        </div>
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-700">SMS Notifications</span>
          <input type="checkbox" class="h-4 w-4 text-primary-600" />
        </div>
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-700">Auto-approve Documents</span>
          <input type="checkbox" class="h-4 w-4 text-primary-600" />
        </div>
      </div>
    </div>
  </div>
</div>
