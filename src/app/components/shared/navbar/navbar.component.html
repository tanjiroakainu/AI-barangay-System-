<nav class="navbar" *ngIf="shouldShowNavbar">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-14 sm:h-16 min-h-[3.5rem]">
      <div class="flex items-center min-w-0">
        <h1 class="text-base sm:text-lg md:text-xl font-bold gradient-text cursor-pointer truncate pr-2" (click)="navigateToHome()">
          Barangay Nexus
        </h1>
        <div class="hidden md:flex ml-6 lg:ml-10 items-center gap-1">
          <a href="#" class="text-gray-600 hover:text-sky-600 px-3 py-2 rounded-lg text-sm font-medium transition-colors">About</a>
          <a href="#" class="text-gray-600 hover:text-sky-600 px-3 py-2 rounded-lg text-sm font-medium transition-colors">Services</a>
          <a href="#" class="text-gray-600 hover:text-sky-600 px-3 py-2 rounded-lg text-sm font-medium transition-colors">Contact</a>
        </div>
      </div>
      <div class="flex items-center gap-2 sm:gap-4 shrink-0">
        <div *ngIf="!currentUser" class="flex items-center gap-2 sm:gap-3">
          <button class="btn-outline text-xs sm:text-sm py-2 px-3 sm:py-2.5 sm:px-4" (click)="navigateToLogin()">Login</button>
          <button class="btn-primary text-xs sm:text-sm py-2 px-3 sm:py-2.5 sm:px-4" (click)="navigateToRegister()">Register</button>
        </div>
        <div *ngIf="currentUser" class="flex items-center gap-2 sm:gap-3 flex-wrap justify-end">
          <span class="text-gray-600 text-xs sm:text-sm truncate max-w-[120px] sm:max-w-none">Welcome, {{ getDisplayName() }}</span>
          <button class="btn-outline text-xs sm:text-sm py-2 px-3 sm:py-2.5 sm:px-4" (click)="navigateToDashboard()">Dashboard</button>
          <button class="text-gray-600 hover:text-gray-900 text-xs sm:text-sm py-2 px-2 font-medium" (click)="logout()">Logout</button>
        </div>
      </div>
    </div>
  </div>
</nav>
